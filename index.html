<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero Aleatorio</title>
    <link rel="stylesheet" href="view.css">
</head>
<body>
    <div id="configurarPanel" style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 50px;">
        <div>   
            <label>Cantidad de números: <input type="number" name="cantidad" id="cantidad" min="1" value="2"></label>
        </div>
        <div> 
            <label>Permitir números negativos: <input type="checkbox" name="negativos" id="negativos"></label>
        </div>
        <div>
            <label>Tiempo de intervalo (segundos): <input type="number" name="TiempoIntervalo" id="TiempoIntervalo" min="1" value="2"></label>
        </div>

        <button type="submit" id="configuracion">Guardar y Comenzar</button>
    </div>

    <div id="panelJuego" style="display: none; flex-direction: column; gap: 20px; margin-top: 50px;">
        
        <div id="numeroDisplay" style="font-size: 5rem; font-weight: bold;">¡Listos!</div>
        <div id="cantidadNumeros" style="font-size: 1rem; font-weight: lighter;"></div>
        
        <div id="zonaRespuesta" style="display: none;">
            <label>Ingresa resultado: <input type="number" name="resultado" id="resultado"></label>
            <button type="submit" id="respuesta">Comprobar resultado</button>
        </div>

    </div>

    <script src="fn.js"></script>
</body>
</html>
